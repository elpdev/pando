name: Publish Relay Image

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether this push should release
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          base_sha="${{ github.event.before }}"
          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$base_sha" "$GITHUB_SHA")"
          if [[ -z "$changed_files" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          should_release="false"
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            case "$file" in
              *.md|docs/*|docs/*/*|.github/*|.github/*/*|.github/*/*/*|.gitignore|LICENSE)
                ;;
              *)
                should_release="true"
                break
                ;;
            esac
          done <<< "$changed_files"

          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        if: steps.changes.outputs.should_release == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Compute next semver tag
        if: steps.changes.outputs.should_release == 'true'
        id: version
        shell: bash
        run: |
          major_regex='^[a-zA-Z]+(\([^)]+\))?!:'
          minor_regex='^feat(\([^)]+\))?:'
          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n1)"
          if [[ -z "$latest_tag" ]]; then
            current_major=0
            current_minor=0
            current_patch=0
            commit_range="${GITHUB_SHA}"
            previous_tag=""
          else
            version="${latest_tag#v}"
            IFS='.' read -r current_major current_minor current_patch <<< "$version"
            commit_range="${latest_tag}..${GITHUB_SHA}"
            previous_tag="$latest_tag"
          fi

          bump="patch"
          while IFS= read -r commit; do
            [[ -z "$commit" ]] && continue
            if [[ "$commit" == *"BREAKING CHANGE:"* ]] || [[ "$commit" =~ $major_regex ]]; then
              bump="major"
              break
            fi
            if [[ "$commit" =~ $minor_regex ]]; then
              bump="minor"
            fi
          done < <(git log --format='%s%n%b' "$commit_range")

          case "$bump" in
            major)
              next_tag="v$((current_major + 1)).0.0"
              ;;
            minor)
              next_tag="v${current_major}.$((current_minor + 1)).0"
              ;;
            *)
              if [[ -z "$latest_tag" ]]; then
                next_tag="v0.1.0"
              else
                next_tag="v${current_major}.${current_minor}.$((current_patch + 1))"
              fi
              ;;
          esac

          echo "tag=${next_tag}" >> "$GITHUB_OUTPUT"
          echo "bump=${bump}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${previous_tag}" >> "$GITHUB_OUTPUT"

      - name: Create git tag
        if: steps.changes.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            "/repos/${GITHUB_REPOSITORY}/git/refs" \
            -f ref="refs/tags/${{ steps.version.outputs.tag }}" \
            -f sha="${GITHUB_SHA}"

      - name: Build release binaries
        if: steps.changes.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${{ steps.version.outputs.tag }}"

          build_unix() {
            local goos="$1"
            local goarch="$2"
            local archive="pando_${version#v}_${goos}_${goarch}.tar.gz"
            local outdir="dist/pando_${version#v}_${goos}_${goarch}"
            mkdir -p "$outdir"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build -mod=vendor -o "$outdir/pando" ./cmd/pando
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build -mod=vendor -o "$outdir/pando-relay" ./cmd/pando-relay
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build -mod=vendor -o "$outdir/pandoctl" ./cmd/pandoctl
            tar -C "$outdir" -czf "dist/$archive" .
            rm -rf "$outdir"
          }

          build_windows() {
            local goarch="$1"
            local archive="pando_${version#v}_windows_${goarch}.zip"
            local outdir="dist/pando_${version#v}_windows_${goarch}"
            mkdir -p "$outdir"
            GOOS=windows GOARCH="$goarch" CGO_ENABLED=0 go build -mod=vendor -o "$outdir/pando.exe" ./cmd/pando
            GOOS=windows GOARCH="$goarch" CGO_ENABLED=0 go build -mod=vendor -o "$outdir/pando-relay.exe" ./cmd/pando-relay
            GOOS=windows GOARCH="$goarch" CGO_ENABLED=0 go build -mod=vendor -o "$outdir/pandoctl.exe" ./cmd/pandoctl
            (cd "$outdir" && zip -q -r "../$archive" .)
            rm -rf "$outdir"
          }

          build_unix linux amd64
          build_unix linux arm64
          build_unix darwin amd64
          build_unix darwin arm64
          build_windows amd64
          build_windows arm64

      - name: Create GitHub release
        if: steps.changes.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          args=(
            "${{ steps.version.outputs.tag }}"
            --target "${GITHUB_SHA}"
            --title "${{ steps.version.outputs.tag }}"
            --generate-notes
          )
          if [[ -n "${{ steps.version.outputs.previous_tag }}" ]]; then
            args+=(--notes-start-tag "${{ steps.version.outputs.previous_tag }}")
          fi
          gh release create "${args[@]}"

      - name: Upload release binaries
        if: steps.changes.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" dist/*

      - name: Set up QEMU
        if: steps.changes.outputs.should_release == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.changes.outputs.should_release == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.changes.outputs.should_release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.changes.outputs.should_release == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pando-relay
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main
            type=raw,value=${{ steps.version.outputs.tag }}
            type=sha,format=short,prefix=sha-

      - name: Build and push relay image
        if: steps.changes.outputs.should_release == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
