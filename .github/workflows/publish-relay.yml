name: Publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether this push should release
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          base_sha="${{ github.event.before }}"
          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$base_sha" "$GITHUB_SHA")"
          if [[ -z "$changed_files" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          should_release="false"
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            case "$file" in
              *.md|docs/*|docs/*/*|.github/*|.github/*/*|.github/*/*/*|.gitignore|LICENSE)
                ;;
              *)
                should_release="true"
                break
                ;;
            esac
          done <<< "$changed_files"

          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        if: steps.changes.outputs.should_release == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Bump version and create tag
        if: steps.changes.outputs.should_release == 'true'
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          default_bump: patch
          initial_version: 0.1.0

      - name: Fetch tags for changelog range
        if: steps.changes.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin

      - name: Run GoReleaser
        if: steps.changes.outputs.should_release == 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.new_tag }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          AUR_KEY: ${{ secrets.AUR_KEY }}

      - name: Set up QEMU
        if: steps.changes.outputs.should_release == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.changes.outputs.should_release == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.changes.outputs.should_release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.changes.outputs.should_release == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pando-relay
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main
            type=raw,value=${{ steps.version.outputs.new_tag }}
            type=sha,format=short,prefix=sha-

      - name: Build and push relay image
        if: steps.changes.outputs.should_release == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
