version: 2

project_name: pando

before:
  hooks: []   # vendor/ is already present; no module fetching needed

builds:
  - id: pando
    binary: pando
    main: ./cmd/pando
    env: [CGO_ENABLED=0]
    flags: [-mod=vendor]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

  - id: pando-relay
    binary: pando-relay
    main: ./cmd/pando-relay
    env: [CGO_ENABLED=0]
    flags: [-mod=vendor]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: pando-archive
    builds: [pando, pando-relay]
    name_template: "pando_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    wrap_in_directory: false

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

nfpms:
  - id: pando-pkg
    builds: [pando, pando-relay]
    package_name: pando
    vendor: elpdev
    homepage: https://github.com/elpdev/pando
    maintainer: elpdev <noreply@github.com>
    description: "Pando — end-to-end encrypted chat over self-hosted relays (TUI client, relay, and CLI)"
    license: MIT
    formats: [deb, rpm]

brews:
  - name: pando
    ids: [pando-archive]
    directory: Formula
    repository:
      owner: elpdev
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: update pando formula to {{ .Tag }}"
    homepage: https://github.com/elpdev/pando
    description: "Pando — end-to-end encrypted chat over self-hosted relays"
    license: MIT
    install: |
      bin.install "pando"
      bin.install "pando-relay"

aurs:
  - name: pando-bin
    ids: [pando-archive]
    homepage: https://github.com/elpdev/pando
    description: "Pando — end-to-end encrypted chat over self-hosted relays"
    maintainers: ["elpdev <noreply@github.com>"]
    license: MIT
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/pando-bin.git"
    skip_upload: auto
    package: |-
      install -Dm755 pando       "${pkgdir}/usr/bin/pando"
      install -Dm755 pando-relay "${pkgdir}/usr/bin/pando-relay"

changelog:
  use: github

release:
  github:
    owner: elpdev
    name: pando
